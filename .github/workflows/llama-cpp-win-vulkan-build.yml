name: Build llama.cpp Windows Vulkan (am17an/mtp-clean)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch/tag/commit of am17an/llama.cpp to build"
        required: true
        default: "mtp-clean"

env:
  VULKAN_VERSION: 1.4.313.2

jobs:
  windows-vulkan:
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout am17an/llama.cpp
        uses: actions/checkout@v5
        with:
          repository: am17an/llama.cpp
          ref: ${{ github.event.inputs.ref || 'mtp-clean' }}
          path: llama.cpp
          fetch-depth: 1

      - name: Setup Node.js for WebUI build
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Predigest WebUI assets so CMake takes the "local" priority branch and never
      # touches npm (CMake's execute_process can't find npm.cmd on Windows).
      # We invoke vite directly to bypass `npm run build`, which calls a bash post-build.sh.
      - name: Build WebUI assets
        shell: cmd
        working-directory: llama.cpp/tools/server/webui
        run: |
          node --version
          npm --version
          npm ci
          npx vite build

      - name: Verify WebUI assets exist
        shell: pwsh
        working-directory: llama.cpp/tools/server/public
        run: |
          $required = @('index.html','bundle.js','bundle.css','loading.html')
          foreach ($f in $required) {
            if (-not (Test-Path $f)) {
              throw "WebUI asset missing: $f"
            }
            Write-Host "OK: $f"
          }

      - name: Record source commit
        shell: pwsh
        working-directory: llama.cpp
        run: |
          $sha = git rev-parse HEAD
          $short = git rev-parse --short HEAD
          "SOURCE_SHA=$sha"     | Out-File -FilePath $env:GITHUB_ENV -Append
          "SOURCE_SHORT=$short" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Building from commit $sha"

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $installerUrl = "https://sdk.lunarg.com/sdk/download/$env:VULKAN_VERSION/windows/vulkansdk-windows-X64-$env:VULKAN_VERSION.exe"
          $installerPath = "$env:RUNNER_TEMP\VulkanSDK-Installer.exe"
          Write-Host "Downloading Vulkan SDK $env:VULKAN_VERSION"
          curl.exe -L -o "$installerPath" "$installerUrl"
          Write-Host "Installing Vulkan SDK"
          Start-Process -FilePath "$installerPath" -ArgumentList "--accept-licenses","--default-answer","--confirm-command","install" -Wait
          $vulkanPath = "C:\VulkanSDK\$env:VULKAN_VERSION"
          if (-not (Test-Path $vulkanPath)) { throw "Vulkan SDK not found at $vulkanPath" }
          "VULKAN_SDK=$vulkanPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$vulkanPath\Bin"        | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Configure with CMake
        shell: cmd
        working-directory: llama.cpp
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DGGML_VULKAN=ON
          -DGGML_NATIVE=OFF
          -DGGML_CPU_ALL_VARIANTS=ON
          -DGGML_BACKEND_DL=ON
          -DGGML_RPC=ON
          -DBUILD_SHARED_LIBS=ON
          -DLLAMA_CURL=OFF
          -DCMAKE_CXX_FLAGS=/utf-8

      - name: Build
        shell: cmd
        working-directory: llama.cpp
        run: cmake --build build --config Release -j --parallel

      - name: Stage binaries
        shell: pwsh
        working-directory: llama.cpp
        run: |
          $stage = "$env:GITHUB_WORKSPACE\stage"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null

          $binDir = "build\bin\Release"
          if (-not (Test-Path $binDir)) { $binDir = "build\bin" }
          Write-Host "Collecting from $binDir"
          Copy-Item -Path "$binDir\*" -Destination $stage -Recurse -Force

          # Vulkan runtime loader
          $vkLoader = "$env:VULKAN_SDK\Bin\vulkan-1.dll"
          if (Test-Path $vkLoader) { Copy-Item $vkLoader -Destination $stage -Force }

          # Bundle OpenSSL DLLs
          $sslSearchPaths = @(
            "C:\Program Files\OpenSSL\bin",
            "C:\Program Files\OpenSSL-Win64\bin",
            "C:\OpenSSL-Win64\bin",
            "$env:ProgramFiles\Common Files\SSL\bin"
          )
          $sslDlls = @("libcrypto-3-x64.dll", "libssl-3-x64.dll")
          foreach ($searchPath in $sslSearchPaths) {
            if (Test-Path $searchPath) {
              foreach ($dll in $sslDlls) {
                $src = Join-Path $searchPath $dll
                if (Test-Path $src) {
                  Write-Host "Found $dll at $src"
                  Copy-Item $src -Destination $stage -Force
                }
              }
              break
            }
          }
          # Fallback: search common runner locations only
          foreach ($dll in $sslDlls) {
            if (-not (Test-Path (Join-Path $stage $dll))) {
              $fallbackPaths = @(
                "C:\Windows\System32",
                "C:\hostedtoolcache",
                "C:\tools",
                "C:\Strawberry\c\bin"
              )
              foreach ($fp in $fallbackPaths) {
                if (-not (Test-Path $fp)) { continue }
                $found = Get-ChildItem -Path $fp -Filter $dll -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
                if ($found) {
                  Write-Host "Found $dll via fallback at $($found.FullName)"
                  Copy-Item $found.FullName -Destination $stage -Force
                  break
                }
              }
              if (-not (Test-Path (Join-Path $stage $dll))) {
                Write-Host "WARNING: $dll not found on runner"
              }
            }
          }

          # Build info
          @"
          source repo : am17an/llama.cpp
          source ref  : ${{ github.event.inputs.ref || 'mtp-clean' }}
          source sha  : $env:SOURCE_SHA
          backend     : Vulkan $env:VULKAN_VERSION
          runner      : windows-2025-vs2026
          built at    : $(Get-Date -Format o)
          cmake flags : -DGGML_VULKAN=ON -DGGML_NATIVE=OFF -DGGML_CPU_ALL_VARIANTS=ON -DGGML_BACKEND_DL=ON -DGGML_RPC=ON -DBUILD_SHARED_LIBS=ON -DLLAMA_CURL=OFF
          "@ | Out-File -FilePath "$stage\BUILD_INFO.txt" -Encoding utf8

          Write-Host "=== Staged files ==="
          Get-ChildItem $stage | Format-Table Name,Length

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: llama-cpp-${{ github.event.inputs.ref || 'mtp-clean' }}-${{ env.SOURCE_SHORT }}-win-vulkan-x64
          path: stage/
          retention-days: 30
